<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(10,58,140,0.12)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#f5f3ed"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- top title block -->
  <g font-family="JetBrains Mono, monospace" fill="#04204e">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#0a3a8c" stroke-width="2"/>
    <text x="40" y="32" font-size="13" font-weight="500" letter-spacing="2">DRAWING TITLE — TOYOPITA · IDENTITY SET MMXXVI</text>
    <text x="780" y="32" font-size="13" font-weight="700" fill="#c83228" letter-spacing="2">TOY-001</text>
    <text x="940" y="32" font-size="13" font-weight="500" letter-spacing="2">SHEET 01/04</text>
    <text x="1090" y="32" font-size="13" font-weight="500" letter-spacing="2">SCALE 1:1</text>
  </g>

  <!-- corner crosshairs -->
  <g stroke="#0a3a8c" stroke-width="1.5">
    <line x1="80" y1="100" x2="100" y2="100"/>
    <line x1="90" y1="90" x2="90" y2="110"/>
    <line x1="1100" y1="100" x2="1120" y2="100"/>
    <line x1="1110" y1="90" x2="1110" y2="110"/>
    <line x1="80" y1="540" x2="100" y2="540"/>
    <line x1="90" y1="530" x2="90" y2="550"/>
    <line x1="1100" y1="540" x2="1120" y2="540"/>
    <line x1="1110" y1="530" x2="1110" y2="550"/>
  </g>

  <!-- main frame -->
  <rect x="80" y="100" width="1040" height="440" fill="none" stroke="#0a3a8c" stroke-width="2"/>

  <!-- main title -->
  <text x="600" y="340" font-family="Inter, sans-serif" font-weight="600" font-size="200" letter-spacing="-8" fill="#04204e" text-anchor="middle">Toyopita</text>

  <!-- dashed underline -->
  <line x1="120" y1="430" x2="1080" y2="430" stroke="#0a3a8c" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- subtitle -->
  <g font-family="JetBrains Mono, monospace" font-size="18" fill="#04204e" letter-spacing="6" text-anchor="middle">
    <text x="600" y="475">FIG.01 <tspan fill="#c83228">·</tspan> SOUND ENGINEER <tspan fill="#c83228">·</tspan> PRODUCER <tspan fill="#c83228">·</tspan> REMIXER <tspan fill="#c83228">·</tspan> EST. 2019</text>
  </g>

  <!-- bottom title block -->
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#0a3a8c" stroke-width="2"/>
  <g font-family="JetBrains Mono, monospace" fill="#04204e" font-size="13" letter-spacing="2">
    <text x="40" y="608" font-weight="700" fill="#c83228">●</text>
    <text x="60" y="608" font-weight="500">OPEN FOR INQUIRIES — toyopita.com</text>
    <text x="640" y="608" font-weight="500">OSAKA, JP</text>
    <text x="780" y="608" font-weight="500">EST. MMXIX</text>
    <text x="930" y="608" font-weight="500">DRAWN BY</text>
  </g>
  <text x="1010" y="608" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#04204e">Toyopita<tspan fill="#c83228">.</tspan> Studio</text>
</svg>
